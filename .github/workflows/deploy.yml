name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Preview
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "PREVIEW_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Preview URL: $DEPLOY_URL"

      - name: Smoke Test Preview
        run: |
          echo "Running smoke test on ${{ env.PREVIEW_URL }}"
          # Wait for deployment to be ready
          sleep 15
          # Test homepage returns 200
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.PREVIEW_URL }}")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Smoke test failed: homepage returned $STATUS"
            exit 1
          fi
          # Test API health endpoint
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.PREVIEW_URL }}/api/health" || echo "404")
          if [ "$API_STATUS" != "200" ] && [ "$API_STATUS" != "404" ]; then
            echo "⚠️ API health check returned $API_STATUS (non-critical)"
          fi
          echo "✅ Smoke test passed!"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "PROD_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Production URL: $DEPLOY_URL"

      - name: Smoke Test Production
        run: |
          echo "Running smoke test on production..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.PROD_URL }}")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Production smoke test failed: returned $STATUS"
            exit 1
          fi
          echo "✅ Production smoke test passed!"
